# Direct-distribution builds: tag `vX.Y.Z` -> draft GitHub Release with installers.
# The release page URLs double as the website's download links.
#
# Windows (.exe, NSIS): built here. Unsigned until the EV cert lands — set the
#   WINDOWS_CERT_* secrets and the signing step below, then installers stop
#   tripping SmartScreen (SPEC §6: required before public distribution).
# macOS (.dmg): signed (Developer ID Application) + notarized + stapled in CI
#   via tauri-action. Universal (Intel + Apple Silicon). Requires the APPLE_*
#   repo secrets listed on the job below.

name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows signing (pending EV cert — opticell open question #1):
          # WINDOWS_CERTIFICATE / WINDOWS_CERTIFICATE_PASSWORD, then set
          # bundle.windows.certificateThumbprint in tauri.conf.json.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MyLLM Connect ${{ github.ref_name }}"
          releaseDraft: true
          args: --bundles nsis

  macos:
    # Enable by setting the repo *variable* MACOS_CI_SIGNING=true once the
    # APPLE_* secrets below are configured. Until then macOS builds are made,
    # signed and notarized locally on the app team's Mac.
    if: ${{ vars.MACOS_CI_SIGNING == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - uses: dtolnay/rust-toolchain@stable
        with: { targets: aarch64-apple-darwin,x86_64-apple-darwin }
      - uses: swatinem/rust-cache@v2
        with: { workspaces: src-tauri }
      - run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing — Developer ID Application cert exported to base64 .p12:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # Notarization — app-specific password (Apple ID method). API-key
          # alternative: APPLE_API_ISSUER / APPLE_API_KEY / APPLE_API_KEY_PATH
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "MyLLM Connect ${{ github.ref_name }}"
          releaseDraft: true
          args: --bundles dmg --target universal-apple-darwin
